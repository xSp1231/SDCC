_BASE_: "../Base-RCNN.yaml"
MODEL:
  WEIGHTS: "checkpoints/voc/split1/defrcn_det_r101_base1/model_reset_remove.pth"
  MASK_ON: False
  BACKBONE:
    FREEZE: False
  RESNETS:
    DEPTH: 101
  RPN:
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.0
    FREEZE: False
  ROI_HEADS:
    NAME: "Res5ROIHeadsCGCL"
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.001
    NUM_CLASSES: 20
    FREEZE_FEAT: True
    CLS_DROPOUT: True
INPUT:
  MIN_SIZE_TRAIN: (480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800)
  MIN_SIZE_TEST: 800
DATASETS:
  TRAIN: ("voc_2007_trainval_all1_2shot_seed0", )
  TEST: ("voc_2007_test_all1",)
SOLVER:
  IMS_PER_BATCH: 16
  BASE_LR: 0.01
  STEPS: (960,)
  MAX_ITER: 1200
  CHECKPOINT_PERIOD: 100000
  WARMUP_ITERS: 0
TEST:
  PCB_ENABLE: False
  PCB_MODELPATH: "ImageNetPretrained/torchvision/resnet101-5d3b4d8f.pth"
  AUG:
    ENABLED: True
  EVAL_PERIOD: 100
CGCL:
  SHOTS: 2
  CONTAINER: 2
  FEATURE_DIM: 128
  KNOWLEDGE_MATRIX: "SemanticSimilarityMatrix/voc_clip_text_martix/split1/voc_split1.npy"
  TAU: 0.2
  COEF: 1.0
OUTPUT_DIR: "checkpoints/voc/split1/2shot_CGCL_seed0"